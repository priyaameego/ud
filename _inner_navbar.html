<!-- =========================================================
     INNER PAGE NAVBAR
     ========================================================= -->
<header class="w-full bg-white border-b border-gray-100 py-3 shadow-sm sticky top-0 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
    <!-- HTML Logo -->
    <a href="index.html" class="flex flex-col">
      <div class="text-[28px] font-black text-[#1a237e] tracking-tight leading-none">UDYOG</div>
      <div class="flex items-center gap-1 mt-1">
        <span class="text-[10px] font-bold text-[#1a237e] tracking-wider leading-none">SUVIDHA KENDRA</span>
        <div class="grid grid-cols-2 gap-[1px]">
          <div class="w-1 h-1 bg-[#84cc16]"></div>
          <div class="w-1 h-1 bg-[#84cc16]"></div>
          <div class="w-1 h-1 bg-[#84cc16]"></div>
          <div class="w-1 h-1 bg-[#84cc16]"></div>
        </div>
      </div>
    </a>
    
    <!-- Desktop Links -->
    <nav class="hidden lg:flex items-center gap-8">
      <a href="index.html" class="text-sm font-semibold text-gray-700 hover:text-[#1a237e] transition-colors">Home</a>
      <a href="#overview" class="text-sm font-semibold text-gray-700 hover:text-[#1a237e] transition-colors">Overview</a>
      <a href="#documents" class="text-sm font-semibold text-gray-700 hover:text-[#1a237e] transition-colors">Documents</a>
      <a href="#process" class="text-sm font-semibold text-gray-700 hover:text-[#1a237e] transition-colors">Process</a>
      <a href="#faq" class="text-sm font-semibold text-gray-700 hover:text-[#1a237e] transition-colors">FAQs</a>
    </nav>
    
    <!-- Right Button -->
    <div class="hidden lg:block">
      <a href="#apply" class="bg-[#1a237e] text-white font-bold py-2.5 px-6 rounded-lg shadow-md hover:shadow-lg hover:bg-[#283593] transition-all duration-300">
        Apply Now
      </a>
    </div>

    <!-- Mobile Hamburger -->
    <button id="inner-mob-toggle" class="lg:hidden text-gray-700 p-2 hover:bg-gray-100 rounded-lg transition-colors">
      <i class="fas fa-bars text-xl"></i>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div id="inner-mobile-nav" class="hidden absolute top-full left-0 w-full bg-white shadow-lg border-t border-gray-100 z-40">
    <div class="flex flex-col p-4">
      <a href="index.html" class="text-sm font-semibold text-gray-800 py-3 border-b border-gray-50">Home</a>
      <a href="#overview" class="text-sm font-semibold text-gray-800 py-3 border-b border-gray-50">Overview</a>
      <a href="#documents" class="text-sm font-semibold text-gray-800 py-3 border-b border-gray-50">Documents</a>
      <a href="#process" class="text-sm font-semibold text-gray-800 py-3 border-b border-gray-50">Process</a>
      <a href="#faq" class="text-sm font-semibold text-gray-800 py-3 border-b border-gray-50">FAQs</a>
      <a href="#apply" class="text-sm font-bold text-[#1a237e] py-3 mt-2">Apply Now <i class="fas fa-arrow-right ml-1"></i></a>
    </div>
  </div>
</header>

<script>
  // Mobile Nav Toggle for Inner Pages
  const innerMobToggle = document.getElementById('inner-mob-toggle');
  const innerMobNav = document.getElementById('inner-mobile-nav');
  if(innerMobToggle && innerMobNav) {
    innerMobToggle.addEventListener('click', () => {
      innerMobNav.classList.toggle('hidden');
    });
  }
</script>
